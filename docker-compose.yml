services:
  netease-api:
    image: binaryify/netease_cloud_music_api
    ports:
      - "3001:3000"
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai

  ai-radio:
    build: .
    ports:
      - "${PORT:-3100}:3100"
    depends_on:
      - netease-api
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - PORT=3100
      - NETEASE_API_URL=http://netease-api:3000
